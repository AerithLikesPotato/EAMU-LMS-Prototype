<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Users | EAMU Admin</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="a_dashboard.css" />
  </head>
  <body>
    <div class="admin-container">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">
          <img src="../images/images.jpg" alt="Logo" class="sidebar-logo" />
          <h3>EAMU Admin</h3>
        </div>

        <nav class="sidebar-nav">
          <a href="a_dashboard.html" class="nav-item">
            <i class="fas fa-tachometer-alt"></i>
            <span>Dashboard</span>
          </a>
          <a href="a_users.html" class="nav-item active">
            <i class="fas fa-users"></i>
            <span>Manage Users</span>
          </a>
          <a href="a_courses.html" class="nav-item">
            <i class="fas fa-book"></i>
            <span>Manage Courses</span>
          </a>
          <a href="a_lessons.html" class="nav-item">
            <i class="fas fa-video"></i>
            <span>Create Lessons</span>
          </a>
          <a href="a_tasks.html" class="nav-item">
            <i class="fas fa-tasks"></i>
            <span>Manage Tasks</span>
          </a>
          <a href="a_settings.html" class="nav-item">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="admin-profile">
            <i class="fas fa-user-circle"></i>
            <div>
              <p id="adminName">Loading...</p>
              <small>Administrator</small>
            </div>
          </div>
          <a href="../login/index.html" id="logoutBtn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
          </a>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
          <h1>Manage Users</h1>
          <div class="top-bar-right">
            <a href="a_notifications.html" class="notification-icon">
              <i class="fas fa-bell"></i>
              <span class="badge" id="notifBadge">0</span>
            </a>
            <div class="date-display">
              <i class="fas fa-calendar"></i>
              <span id="currentDate"></span>
            </div>
          </div>
        </div>

        <!-- Content Area -->
        <div class="content-area">
          <!-- Page Header -->
          <div class="page-header">
            <h2>All Users</h2>
            <button class="btn btn-primary" onclick="openModal('addUserModal')">
              <i class="fas fa-plus"></i> Add New User
            </button>
          </div>

          <!-- Search Bar -->
          <div class="search-bar">
            <input
              type="text"
              id="searchUsers"
              placeholder="Search users by name, username, or email..."
            />
            <i class="fas fa-search"></i>
          </div>

          <!-- Users Table -->
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Username</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="usersTableBody">
                <tr>
                  <td colspan="7" class="empty-state">
                    <i class="fas fa-users"></i>
                    <p>No users found</p>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Add User Modal -->
    <div id="addUserModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Add New User</h3>
          <button class="close-modal" onclick="closeModal('addUserModal')">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <form id="addUserForm">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" class="form-control" name="name" required />
            </div>
            <div class="form-group">
              <label>Username</label>
              <input
                type="text"
                class="form-control"
                name="username"
                required
              />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" class="form-control" name="email" required />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                class="form-control"
                name="password"
                required
              />
            </div>
            <div class="form-group">
              <label>Role</label>
              <select class="form-control" name="role" required>
                <option value="">Select Role</option>
                <option value="student">Student</option>
                <option value="instructor">Instructor</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select class="form-control" name="status" required>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button
            class="btn btn-secondary"
            onclick="closeModal('addUserModal')"
          >
            Cancel
          </button>
          <button class="btn btn-primary" onclick="saveUser()">
            Save User
          </button>
        </div>
      </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editUserModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Edit User</h3>
          <button class="close-modal" onclick="closeModal('editUserModal')">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <form id="editUserForm">
            <input type="hidden" name="userId" id="editUserId" />
            <div class="form-group">
              <label>Full Name</label>
              <input
                type="text"
                class="form-control"
                name="name"
                id="editName"
                required
              />
            </div>
            <div class="form-group">
              <label>Username</label>
              <input
                type="text"
                class="form-control"
                name="username"
                id="editUsername"
                required
              />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input
                type="email"
                class="form-control"
                name="email"
                id="editEmail"
                required
              />
            </div>
            <div class="form-group">
              <label>Password</label>
              <input
                type="password"
                class="form-control"
                name="password"
                placeholder="Leave blank to keep current"
              />
            </div>
            <div class="form-group">
              <label>Role</label>
              <select class="form-control" name="role" id="editRole" required>
                <option value="student">Student</option>
                <option value="instructor">Instructor</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select
                class="form-control"
                name="status"
                id="editStatus"
                required
              >
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button
            class="btn btn-secondary"
            onclick="closeModal('editUserModal')"
          >
            Cancel
          </button>
          <button class="btn btn-primary" onclick="updateUser()">
            Update User
          </button>
        </div>
      </div>
    </div>

    <!-- View User Modal -->
    <div id="viewUserModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>User Details</h3>
          <button class="close-modal" onclick="closeModal('viewUserModal')">
            &times;
          </button>
        </div>
        <div class="modal-body" id="userDetails">
          <!-- User details will be loaded here -->
        </div>
        <div class="modal-footer">
          <button
            class="btn btn-secondary"
            onclick="closeModal('viewUserModal')"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <script src="../auth_helper.js"></script>
    <script src="a_users.js"></script>
      <script src="a_notif_badge.js"></script>
</body>
</html>
