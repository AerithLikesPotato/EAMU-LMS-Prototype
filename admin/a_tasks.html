<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Tasks | EAMU Admin</title>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="a_dashboard.css" />

    <style>
      .question-bank {
        margin-top: 30px;
        border-top: 2px solid #eef2f6;
        padding-top: 30px;
      }

      .question-list {
        margin-top: 20px;
      }

      .question-card {
        background: #f8f9fa;
        border-radius: var(--border-radius);
        padding: 20px;
        margin-bottom: 15px;
        border: 1px solid #eef2f6;
      }

      .question-text {
        font-weight: 600;
        margin-bottom: 15px;
      }

      .options-list {
        list-style: none;
        padding-left: 20px;
      }

      .options-list li {
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .correct-answer {
        color: var(--success);
        font-weight: 600;
        margin-top: 10px;
        font-size: 0.9rem;
      }

      .correct-answer i {
        margin-right: 5px;
      }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="sidebar-header">
          <img src="../images/images.jpg" alt="Logo" class="sidebar-logo" />
          <h3>EAMU Admin</h3>
        </div>

        <nav class="sidebar-nav">
          <a href="a_dashboard.html" class="nav-item">
            <i class="fas fa-tachometer-alt"></i>
            <span>Dashboard</span>
          </a>
          <a href="a_users.html" class="nav-item">
            <i class="fas fa-users"></i>
            <span>Manage Users</span>
          </a>
          <a href="a_courses.html" class="nav-item">
            <i class="fas fa-book"></i>
            <span>Manage Courses</span>
          </a>
          <a href="a_lessons.html" class="nav-item">
            <i class="fas fa-video"></i>
            <span>Create Lessons</span>
          </a>
          <a href="a_tasks.html" class="nav-item active">
            <i class="fas fa-tasks"></i>
            <span>Manage Tasks</span>
          </a>
          <a href="a_settings.html" class="nav-item">
            <i class="fas fa-cog"></i>
            <span>Settings</span>
          </a>
        </nav>

        <div class="sidebar-footer">
          <div class="admin-profile">
            <i class="fas fa-user-circle"></i>
            <div>
              <p id="adminName">Loading...</p>
              <small>Administrator</small>
            </div>
          </div>
          <a href="../login/index.html" id="logoutBtn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
          </a>
        </div>
      </div>

      <!-- Main Content -->
      <div class="main-content">
        <!-- Top Bar -->
        <div class="top-bar">
          <h1>Manage Tasks</h1>
          <div class="top-bar-right">
            <a href="a_notifications.html" class="notification-icon">
              <i class="fas fa-bell"></i>
              <span class="badge" id="notifBadge">0</span>
            </a>
            <div class="date-display">
              <i class="fas fa-calendar"></i>
              <span id="currentDate"></span>
            </div>
          </div>
        </div>

        <!-- Content Area -->
        <div class="content-area">
          <!-- Page Header -->
          <div class="page-header">
            <h2>Tasks & Questions</h2>
            <button class="btn btn-primary" onclick="openModal('addTaskModal')">
              <i class="fas fa-plus"></i> Create New Task
            </button>
          </div>

          <!-- Course Selection -->
          <div class="form-group" style="max-width: 300px">
            <label>Filter by Course</label>
            <select
              class="form-control"
              id="courseFilter"
              onchange="filterTasks()"
            >
              <option value="">All Courses</option>
              <!-- Will be populated from database -->
            </select>
          </div>

          <!-- Tasks Grid -->
          <div class="cards-grid" id="tasksGrid">
            <div class="empty-state">
              <i class="fas fa-tasks"></i>
              <h3>No Tasks Yet</h3>
              <p>
                Click the button above to create your first task with questions.
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Add Task Modal -->
    <div id="addTaskModal" class="modal">
      <div class="modal-content" style="max-width: 800px">
        <div class="modal-header">
          <h3>Create New Task</h3>
          <button class="close-modal" onclick="closeModal('addTaskModal')">
            &times;
          </button>
        </div>
        <div class="modal-body">
          <form id="addTaskForm">
            <div class="form-group">
              <label>Task Title</label>
              <input
                type="text"
                class="form-control"
                name="title"
                id="taskTitle"
                required
              />
            </div>

            <div class="form-group">
              <label>Course</label>
              <select
                class="form-control"
                name="courseId"
                id="taskCourseId"
                required
              >
                <option value="">Select Course</option>
                <!-- Will be populated from database -->
              </select>
            </div>

            <div class="form-group">
              <label>Description</label>
              <textarea
                class="form-control"
                name="description"
                id="taskDescription"
                rows="3"
              ></textarea>
            </div>

            <div class="form-group">
              <label>Points Possible</label>
              <input
                type="number"
                class="form-control"
                name="points"
                id="taskPoints"
                value="100"
                min="0"
              />
            </div>

            <div class="form-group">
              <label>Due Date</label>
              <input
                type="date"
                class="form-control"
                name="dueDate"
                id="taskDueDate"
              />
            </div>

            <!-- Questions Section -->
            <div class="questions-container">
              <h4 style="margin-bottom: 15px">Questions</h4>
              <div id="questionsList"></div>

              <button
                type="button"
                class="btn btn-secondary"
                onclick="addQuestion()"
                style="margin-top: 15px"
              >
                <i class="fas fa-plus"></i> Add Question
              </button>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button
            class="btn btn-secondary"
            onclick="closeModal('addTaskModal')"
          >
            Cancel
          </button>
          <button class="btn btn-primary" onclick="saveTask()">
            Save Task
          </button>
        </div>
      </div>
    </div>

    <!-- View Task Modal -->
    <div id="viewTaskModal" class="modal">
      <div class="modal-content" style="max-width: 700px">
        <div class="modal-header">
          <h3>Task Details</h3>
          <button class="close-modal" onclick="closeModal('viewTaskModal')">
            &times;
          </button>
        </div>
        <div class="modal-body" id="taskDetails">
          <!-- Task details will be loaded here -->
        </div>
        <div class="modal-footer">
          <button
            class="btn btn-secondary"
            onclick="closeModal('viewTaskModal')"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <!-- JavaScript -->
    <script src="../auth_helper.js"></script>
    <script src="a_tasks.js"></script>
    <script src="../auth_helper.js"></script>
    <script src="a_notifications.js"></script>
      <script src="a_notif_badge.js"></script>
</body>
</html>
